<html>
<head>
    <title>Microsoft Teams Meeting Room</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <script src="https://statics.teams.cdn.office.net/sdk/v1.6.0/js/MicrosoftTeams.min.js"></script>
</head>
<body>
    <div class="container">
        <h1 class="text-center">Welcome to Microsoft Teams Meeting Room</h1>
        <p class="text-center">Please enter your meeting ID and password to join the meeting.</p>
        <form id="meeting-form" class="form-inline justify-content-center">
            <div class="form-group">
                <label for="meeting-id">Meeting ID:</label>
                <input type="text" id="meeting-id" class="form-control" placeholder="Enter meeting ID" required>
            </div>
            <div class="form-group">
                <label for="meeting-password">Password:</label>
                <input type="password" id="meeting-password" class="form-control" placeholder="Enter password" required>
            </div>
            <button type="submit" id="join-button" class="btn btn-primary">Join Meeting</button>
        </form>
    </div>
    <script>
        // Initialize the Microsoft Teams SDK
        microsoftTeams.initialize();

        // Get the meeting form element
        var meetingForm = document.getElementById("meeting-form");

        // Add an event listener for the submit event
        meetingForm.addEventListener("submit", function(event) {
            // Prevent the default form submission behavior
            event.preventDefault();

            // Get the meeting ID and password from the input elements
            var meetingId = document.getElementById("meeting-id").value;
            var meetingPassword = document.getElementById("meeting-password").value;

            // Validate the meeting ID and password
            if (meetingId && meetingPassword) {
                // Join the meeting using the SDK method
                microsoftTeams.meeting.join({
                    meetingLink: meetingId,
                    password: meetingPassword
                }, function(error) {
                    // Handle any errors
                    if (error) {
                        alert("Failed to join the meeting: " + error);
                    }
                });
            } else {
                // Show an alert if the meeting ID or password is missing
                alert("Please enter a valid meeting ID and password.");
            }
        });
    </script>
</body>
</html>
